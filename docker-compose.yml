services:

  # ── 1. Database ──────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: autoest_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autoest}
      POSTGRES_USER: ${POSTGRES_USER:-autoest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoest_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoest}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── 2. FastAPI Backend ────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: autoest_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-autoest}:${POSTGRES_PASSWORD:-autoest_secret}@db:5432/${POSTGRES_DB:-autoest}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_prod}
      UPLOAD_DIR: /app/uploads
      SVG_DIR: /app/svgs
    volumes:
      - ./api:/app
      - uploads:/app/uploads
      - svgs:/app/svgs
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── 3. Playwright Scraper Worker ─────────────────────────────
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: autoest_scraper
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-autoest}:${POSTGRES_PASSWORD:-autoest_secret}@db:5432/${POSTGRES_DB:-autoest}
      SVG_DIR: /app/svgs
      SCRAPE_DELAY_MIN: "2"
      SCRAPE_DELAY_MAX: "5"
    volumes:
      - ./scraper:/app
      - svgs:/app/svgs

  # ── 4. Frontend (Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autoest_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - uploads:/var/www/uploads:ro
      - svgs:/var/www/svgs:ro

volumes:
  pg_data:
  uploads:
  svgs:
