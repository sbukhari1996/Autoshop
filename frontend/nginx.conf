server {
    listen NGINX_PORT;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://autoshop.railway.internal:8000/api/;
        proxy_set_header Host autoshop.railway.internal;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
